<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>청첩장</title>
<meta property="og:title" content="청첩장" />
<meta property="og:description" content="결혼식에 초대합니다" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Noto+Serif+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
/* ── Reset ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #E8E2D6; font-family: Pretendard, -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }

/* ── 스케일 변수 (큰글씨 모드) ─────────────────────── */
:root { --s: 1; }
.large-text { --s: 1.28; }

/* ── 레이아웃 ─────────────────────────────────────── */
#app { min-height: 100vh; display: flex; justify-content: center; }
.invite { width: 100%; max-width: 460px; background: #FAF7F2; min-height: 100vh; box-shadow: 0 0 60px rgba(0,0,0,0.06); position: relative; }

/* ── 로딩 ─────────────────────────────────────────── */
#loading { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #FAF7F2; }
.spinner { width: 28px; height: 28px; border: 2px solid #ECE6DA; border-top-color: #A07856; border-radius: 50%; animation: spin 0.8s linear infinite; }
#error { display: none; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; background: #FAF7F2; font-family: "Noto Serif KR", serif; color: #8A8378; gap: 8px; font-size: 14px; text-align: center; white-space: pre-line; padding: 20px; }

/* ── TopBar ─────────────────────────────────────────  */
.topbar { position: sticky; top: 0; z-index: 30; display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: linear-gradient(to bottom, rgba(250,247,242,0.92) 60%, transparent); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
.btn-large-text { display: flex; align-items: center; gap: 6px; height: 36px; padding: 0 12px 0 10px; border-radius: 999px; background: rgba(255,255,255,0.9); color: #2C2A26; border: 1px solid rgba(44,42,38,0.12); box-shadow: 0 2px 10px rgba(44,42,38,0.06); font-size: calc(13px * var(--s)); font-weight: 500; transition: background 0.15s, color 0.15s; }
.btn-large-text.active { background: #2C2A26; color: #FAF7F2; border-color: #2C2A26; }
.btn-share-top { width: 36px; height: 36px; border-radius: 999px; background: rgba(255,255,255,0.9); border: 1px solid rgba(44,42,38,0.12); box-shadow: 0 2px 10px rgba(44,42,38,0.06); display: flex; align-items: center; justify-content: center; }

/* ── Cover ─────────────────────────────────────────── */
.cover { padding: 40px 28px 56px; text-align: center; }
.eyebrow { font-family: "Cormorant Garamond", serif; font-size: calc(12px * var(--s)); letter-spacing: 6px; color: #8A8378; margin-bottom: 36px; text-transform: uppercase; }
.cover-photo { width: 100%; aspect-ratio: 3/4; border-radius: 4px; margin-bottom: 40px; object-fit: cover; display: block; }
.cover-photo-placeholder { width: 100%; aspect-ratio: 3/4; border-radius: 4px; margin-bottom: 40px; background: repeating-linear-gradient(135deg, #E8E2D6 0px, #E8E2D6 1px, #EDE7DC 1px, #EDE7DC 14px), #EDE7DC; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #A39A8A; font-family: ui-monospace, "SF Mono", monospace; font-size: calc(11px * var(--s)); letter-spacing: 0.6px; gap: 4px; }
.couple-names { font-family: "Cormorant Garamond", serif; font-size: calc(40px * var(--s)); color: #2C2A26; line-height: 1.1; letter-spacing: -0.5px; }
.ampersand { display: block; font-size: calc(22px * var(--s)); font-style: italic; color: #A07856; margin: 8px 0; font-weight: 300; }
.divider-line { height: 1px; background: #D9D2C5; width: 60px; margin: 32px auto 0; }
.cover-date { margin-top: 24px; font-size: calc(14px * var(--s)); color: #5C564D; line-height: 1.8; letter-spacing: 0.4px; }
.cover-date .muted { color: #8A8378; }

/* ── Greeting ─────────────────────────────────────── */
.greeting { padding: 56px 32px; text-align: center; border-top: 1px solid #ECE6DA; }
.section-eyebrow { font-family: "Cormorant Garamond", serif; font-size: calc(11px * var(--s)); letter-spacing: 5px; color: #A07856; margin-bottom: 12px; text-transform: uppercase; }
.greeting-title { font-family: "Noto Serif KR", serif; font-size: calc(18px * var(--s)); color: #2C2A26; margin-bottom: 28px; font-weight: 500; letter-spacing: -0.2px; }
.greeting-body { font-family: "Noto Serif KR", serif; font-size: calc(14px * var(--s)); color: #5C564D; line-height: 2; white-space: pre-line; letter-spacing: -0.1px; }
.parents-grid { margin-top: 40px; display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; }
.parents-side { font-family: "Noto Serif KR", serif; font-size: calc(13px * var(--s)); color: #5C564D; line-height: 1.7; }
.parents-side.right { text-align: right; }
.parents-side .side-label { color: #8A8378; font-size: calc(11px * var(--s)); margin-bottom: 2px; display: block; }
.parents-side .child-name { color: #2C2A26; }
.parents-divider { width: 1px; height: 36px; background: #D9D2C5; }

/* ── DateCard ─────────────────────────────────────── */
.date-card { padding: 56px 28px; text-align: center; border-top: 1px solid #ECE6DA; background: #FBF8F2; }
.month-header { font-family: "Cormorant Garamond", serif; font-size: calc(16px * var(--s)); color: #5C564D; letter-spacing: 4px; margin-bottom: 4px; }
.calendar { background: #fff; border-radius: 6px; padding: 20px 14px 16px; margin: 20px auto 0; max-width: 280px; border: 1px solid #ECE6DA; }
.cal-header { display: grid; grid-template-columns: repeat(7, 1fr); font-family: "Cormorant Garamond", serif; font-size: calc(10px * var(--s)); letter-spacing: 1px; margin-bottom: 10px; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); row-gap: 6px; font-family: "Cormorant Garamond", serif; font-size: calc(13px * var(--s)); }
.cal-cell { height: 28px; display: flex; align-items: center; justify-content: center; }
.cal-day { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.cal-day.target { background: #A07856; color: #fff; font-weight: 600; }
.cal-day.sun { color: #C97B6A; }
.cal-day.sat { color: #7A8FA6; }
.cal-day.normal { color: #2C2A26; }
.full-date { margin-top: 18px; font-family: "Noto Serif KR", serif; font-size: calc(14px * var(--s)); color: #2C2A26; line-height: 1.7; }
.full-date .muted { color: #8A8378; }

/* ── Countdown ─────────────────────────────────────── */
.countdown { padding: 48px 28px; border-top: 1px solid #ECE6DA; text-align: center; }
.countdown-label { font-size: calc(13px * var(--s)); color: #5C564D; margin-bottom: 6px; }
.countdown-label .accent { color: #A07856; }
.dday-label { font-family: "Cormorant Garamond", serif; font-size: calc(11px * var(--s)); letter-spacing: 4px; color: #A07856; text-transform: uppercase; margin-bottom: 24px; }
.counter-row { display: flex; align-items: center; gap: 4px; padding: 20px 8px; background: #fff; border-radius: 6px; border: 1px solid #ECE6DA; }
.counter-cell { flex: 1; text-align: center; }
.counter-num { font-family: "Cormorant Garamond", serif; color: #2C2A26; line-height: 1; font-variant-numeric: tabular-nums; }
.counter-num.big { font-size: calc(36px * var(--s)); }
.counter-num.sm  { font-size: calc(30px * var(--s)); }
.counter-unit { font-size: calc(10px * var(--s)); color: #8A8378; letter-spacing: 1px; margin-top: 8px; text-transform: uppercase; }
.counter-sep { color: #D9D2C5; font-family: "Cormorant Garamond", serif; font-size: calc(24px * var(--s)); align-self: flex-start; margin-top: -4px; }

/* ── Location ─────────────────────────────────────── */
.location { padding: 56px 28px 48px; border-top: 1px solid #ECE6DA; background: #FBF8F2; text-align: center; }
.venue-name { font-family: "Noto Serif KR", serif; font-size: calc(20px * var(--s)); color: #2C2A26; font-weight: 500; letter-spacing: -0.3px; margin-bottom: 4px; }
.venue-hall { font-size: calc(13px * var(--s)); color: #5C564D; }
.map-placeholder { margin-top: 22px; width: 100%; height: 160px; border-radius: 6px; background: linear-gradient(135deg, #F5F0E5, #EFE9DB); position: relative; overflow: hidden; border: 1px solid #ECE6DA; }
.map-pin { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -100%); display: flex; flex-direction: column; align-items: center; }
.map-pin-label { background: #A07856; color: #fff; padding: 6px 12px; border-radius: 999px; font-size: 11px; font-weight: 600; box-shadow: 0 4px 12px rgba(160,120,86,0.3); white-space: nowrap; }
.map-pin-arrow { width: 0; height: 0; margin-top: -1px; border-left: 5px solid transparent; border-right: 5px solid transparent; border-top: 6px solid #A07856; }
.map-pin-dot { width: 10px; height: 10px; border-radius: 50%; background: #A07856; border: 2px solid #fff; margin-top: 2px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
.address-row { margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: calc(13px * var(--s)); color: #2C2A26; flex-wrap: wrap; }
.btn-copy { display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border-radius: 999px; background: #fff; color: #5C564D; border: 1px solid #ECE6DA; font-size: 11px; cursor: pointer; transition: background 0.15s, color 0.15s; }
.btn-copy.copied { background: #2C2A26; color: #FAF7F2; border-color: #2C2A26; }
.map-btns-label { font-size: calc(11px * var(--s)); color: #8A8378; margin-bottom: 10px; letter-spacing: 0.5px; }
.map-btns { display: flex; gap: 10px; margin-top: 22px; }
.map-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 6px; border-radius: 10px; background: #fff; border: 1px solid #ECE6DA; cursor: pointer; }
.map-btn-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 13px; }
.map-btn-label { font-size: 12px; color: #2C2A26; font-weight: 600; }
.map-btn-sub { font-size: 10px; color: #8A8378; }
.transport-card { margin-top: 26px; text-align: left; background: #fff; border-radius: 6px; padding: 16px 18px; border: 1px solid #ECE6DA; }
.transport-row { display: flex; gap: 10px; margin-bottom: 10px; }
.transport-row:last-child { margin-bottom: 0; }
.transport-label { font-size: calc(11px * var(--s)); font-weight: 700; color: #A07856; min-width: 40px; }
.transport-text { font-size: calc(12px * var(--s)); color: #2C2A26; line-height: 1.6; }

/* ── Footer ─────────────────────────────────────────  */
.footer { padding: 48px 28px 80px; border-top: 1px solid #ECE6DA; text-align: center; }
.thank-you { font-family: "Cormorant Garamond", serif; font-size: calc(13px * var(--s)); color: #A07856; letter-spacing: 4px; margin-bottom: 18px; }
.footer-msg { font-family: "Noto Serif KR", serif; font-size: calc(14px * var(--s)); color: #5C564D; line-height: 1.9; white-space: pre-line; }
.btn-share-footer { margin-top: 28px; display: inline-flex; align-items: center; gap: 8px; padding: 14px 28px; border-radius: 999px; background: #2C2A26; color: #FAF7F2; font-size: calc(13px * var(--s)); font-weight: 500; letter-spacing: 0.2px; }

/* ── ShareSheet ─────────────────────────────────────  */
.share-overlay { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; justify-content: flex-end; background: rgba(28,26,22,0.4); backdrop-filter: blur(2px); animation: fadeIn 0.2s ease-out; }
.share-sheet { background: #FAF7F2; border-radius: 20px 20px 0 0; padding: 12px 24px 36px; max-width: 460px; width: 100%; margin: 0 auto; animation: slideUp 0.25s ease-out; }
.sheet-handle { width: 36px; height: 4px; background: #D9D2C5; border-radius: 2px; margin: 0 auto 18px; }
.sheet-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
.sheet-title { font-family: "Noto Serif KR", serif; font-size: 17px; font-weight: 500; color: #2C2A26; }
.btn-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
.share-options { display: flex; gap: 12px; margin-bottom: 22px; }
.share-opt { flex: 1; text-align: center; cursor: pointer; }
.share-opt-icon { width: 52px; height: 52px; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; margin: 0 auto 8px; }
.share-opt-label { font-size: 11px; color: #5C564D; }
.share-url-row { display: flex; align-items: center; gap: 8px; padding: 12px 16px; background: #fff; border: 1px solid #ECE6DA; border-radius: 10px; }
.share-url-text { flex: 1; font-family: ui-monospace, monospace; font-size: 12px; color: #5C564D; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.btn-copy-url { padding: 6px 12px; border-radius: 999px; background: #A07856; color: #fff; font-size: 12px; font-weight: 600; transition: background 0.15s; }
.btn-copy-url.copied { background: #2C2A26; }
.hidden { display: none !important; }

/* ── Animations ─────────────────────────────────────  */
@keyframes fadeIn  { from { opacity: 0 } to { opacity: 1 } }
@keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
@keyframes spin    { to { transform: rotate(360deg) } }
</style>
</head>
<body>
<div id="app">
  <!-- 로딩 -->
  <div id="loading"><div class="spinner"></div></div>

  <!-- 에러 -->
  <div id="error">
    <div>청첩장을 불러올 수 없습니다</div>
    <div style="font-size:12px;margin-top:4px">잠시 후 다시 시도해 주세요</div>
  </div>

  <!-- 청첩장 본문 (데이터 로드 후 표시) -->
  <div class="invite hidden" id="invite">
    <!-- TopBar -->
    <div class="topbar">
      <button class="btn-large-text" id="btn-large-text">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 7h8M7 7v12M14 11h6M17 11v8M3 4h8M14 8h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <span>큰글씨 보기</span>
      </button>
      <button class="btn-share-top" id="btn-share-top">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="12" r="2.5" stroke="#2C2A26" stroke-width="1.4"/><circle cx="18" cy="6" r="2.5" stroke="#2C2A26" stroke-width="1.4"/><circle cx="18" cy="18" r="2.5" stroke="#2C2A26" stroke-width="1.4"/><path d="M8.2 10.8l7.6-3.6M8.2 13.2l7.6 3.6" stroke="#2C2A26" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
    </div>

    <!-- Cover -->
    <section class="cover">
      <div class="eyebrow">We're getting married</div>
      <div id="cover-media"></div>
      <div class="couple-names">
        <span id="groom-name"></span>
        <span class="ampersand">&amp;</span>
        <span id="bride-name"></span>
      </div>
      <div class="divider-line"></div>
      <div class="cover-date" id="cover-date"></div>
    </section>

    <!-- Greeting -->
    <section class="greeting">
      <div class="section-eyebrow">Invitation</div>
      <div class="greeting-title" id="greeting-title"></div>
      <div class="greeting-body" id="greeting-body"></div>
      <div class="parents-grid">
        <div class="parents-side right" id="parents-groom"></div>
        <div class="parents-divider"></div>
        <div class="parents-side" id="parents-bride"></div>
      </div>
    </section>

    <!-- DateCard -->
    <section class="date-card">
      <div class="section-eyebrow">The Day</div>
      <div class="month-header" id="month-header"></div>
      <div class="calendar" id="calendar"></div>
      <div class="full-date" id="full-date"></div>
    </section>

    <!-- Countdown -->
    <section class="countdown">
      <div class="countdown-label" id="countdown-label"></div>
      <div class="dday-label" id="dday-label"></div>
      <div class="counter-row">
        <div class="counter-cell">
          <div class="counter-num big" id="cnt-days">00</div>
          <div class="counter-unit">Days</div>
        </div>
        <div class="counter-sep">:</div>
        <div class="counter-cell">
          <div class="counter-num sm" id="cnt-hours">00</div>
          <div class="counter-unit">Hours</div>
        </div>
        <div class="counter-sep">:</div>
        <div class="counter-cell">
          <div class="counter-num sm" id="cnt-min">00</div>
          <div class="counter-unit">Min</div>
        </div>
        <div class="counter-sep">:</div>
        <div class="counter-cell">
          <div class="counter-num sm" id="cnt-sec">00</div>
          <div class="counter-unit">Sec</div>
        </div>
      </div>
    </section>

    <!-- Location -->
    <section class="location">
      <div class="section-eyebrow">Location</div>
      <div class="venue-name" id="venue-name"></div>
      <div class="venue-hall" id="venue-hall"></div>
      <div class="map-placeholder">
        <svg viewBox="0 0 320 160" style="position:absolute;inset:0;width:100%;height:100%">
          <path d="M0 120 Q 80 80 160 90 T 320 60" stroke="#DDD5C5" stroke-width="6" fill="none"/>
          <path d="M0 120 Q 80 80 160 90 T 320 60" stroke="#fff" stroke-width="2" stroke-dasharray="6 6" fill="none"/>
          <path d="M40 0 L 60 160" stroke="#E8E0CE" stroke-width="4" fill="none"/>
          <path d="M220 0 L 240 160" stroke="#E8E0CE" stroke-width="4" fill="none"/>
        </svg>
        <div class="map-pin">
          <div class="map-pin-label" id="map-pin-label"></div>
          <div class="map-pin-arrow"></div>
          <div class="map-pin-dot"></div>
        </div>
      </div>
      <div class="address-row">
        <span id="venue-address"></span>
        <button class="btn-copy" id="btn-copy-addr">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="8" y="3" width="13" height="13" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M16 16v3a2 2 0 01-2 2H5a2 2 0 01-2-2V10a2 2 0 012-2h3" stroke="currentColor" stroke-width="1.4"/></svg>
          <span>복사</span>
        </button>
      </div>
      <div style="margin-top:22px">
        <div class="map-btns-label">지도앱에서 길찾기</div>
        <div class="map-btns" id="map-btns"></div>
      </div>
      <div class="transport-card hidden" id="transport-card"></div>
    </section>

    <!-- Footer -->
    <section class="footer">
      <div class="thank-you">THANK YOU</div>
      <div class="footer-msg" id="footer-msg"></div>
      <button class="btn-share-footer" id="btn-share-footer">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="6" cy="12" r="2.5" stroke="currentColor" stroke-width="1.4"/><circle cx="18" cy="6" r="2.5" stroke="currentColor" stroke-width="1.4"/><circle cx="18" cy="18" r="2.5" stroke="currentColor" stroke-width="1.4"/><path d="M8.2 10.8l7.6-3.6M8.2 13.2l7.6 3.6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        청첩장 공유하기
      </button>
    </section>
  </div><!-- /invite -->
</div><!-- /app -->

<!-- ShareSheet 모달 -->
<div class="share-overlay hidden" id="share-overlay">
  <div class="share-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title">청첩장 공유하기</div>
      <button class="btn-close" id="btn-close-share">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="#5C564D" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="share-options" id="share-options"></div>
    <div class="share-url-row">
      <div class="share-url-text" id="share-url-text"></div>
      <button class="btn-copy-url" id="btn-copy-url">URL 복사</button>
    </div>
  </div>
</div>

<!-- Firebase compat SDK -->
<script src="/__/firebase/12.13.0/firebase-app-compat.js"></script>
<script src="/__/firebase/12.13.0/firebase-firestore-compat.js"></script>
<script src="/__/firebase/12.13.0/firebase-storage-compat.js"></script>
<script src="/__/firebase/init.js"></script>

<script src="invite.js"></script>
<script src="app.js"></script>
</body>
</html>
