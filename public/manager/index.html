<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>청첩장 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Noto Sans KR', -apple-system, system-ui, sans-serif; background: #F4F2EE; color: #1A1916; -webkit-font-smoothing: antialiased; font-size: 14px; }
button, input, textarea, select { font-family: inherit; font-size: 14px; }
button { cursor: pointer; }

/* ── 공통 ─────────────────────────────────── */
.hidden { display: none !important; }
.card { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #ECE6DA; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; border: none; cursor: pointer; }
.btn-primary   { background: #2C2A26; color: #FAF7F2; }
.btn-secondary { background: #fff; color: #2C2A26; border: 1px solid #E0D9CE; }
.btn-danger    { background: #FEF2F2; color: #DC2626; border: 1px solid #FECACA; }
.btn-ghost     { background: transparent; color: #5C564D; border: none; }
.btn:disabled  { opacity: 0.55; cursor: default; }
label { font-size: 12px; font-weight: 600; color: #5C564D; display: block; margin-bottom: 5px; }
input[type=text], input[type=email], input[type=password], input[type=number], input[type=datetime-local], textarea, select {
  width: 100%; padding: 9px 12px; border: 1px solid #E0D9CE; border-radius: 8px; font-size: 13px; background: #fff; outline: none; color: #1A1916;
}
textarea { resize: vertical; line-height: 1.7; }
input:focus, textarea:focus, select:focus { border-color: #A07856; }
.form-row { display: flex; flex-direction: column; gap: 5px; }
.form-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.section-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: #1A1916; }
.spinner { width: 24px; height: 24px; border: 2px solid #E0D9CE; border-top-color: #A07856; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg) } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px) } to { opacity: 1; transform: none } }

/* ── 로그인 ────────────────────────────────── */
#login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
#login-screen .card { width: 100%; max-width: 360px; animation: fadeIn 0.3s ease-out; }
.login-heading { font-size: 20px; font-weight: 600; color: #1A1916; text-align: center; margin-bottom: 6px; }
.login-sub { font-size: 13px; color: #8A8378; text-align: center; margin-bottom: 28px; }
.login-form { display: flex; flex-direction: column; gap: 14px; }
.error-box { font-size: 12px; color: #DC2626; background: #FEF2F2; padding: 8px 12px; border-radius: 6px; }

/* ── 헤더 ─────────────────────────────────── */
header { background: #fff; border-bottom: 1px solid #ECE6DA; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 10; }
.header-left  { display: flex; align-items: center; gap: 12px; }
.header-right { display: flex; gap: 8px; }
.page-title { font-size: 16px; font-weight: 600; }

/* ── 본문 ─────────────────────────────────── */
main { max-width: 720px; margin: 0 auto; padding: 24px 16px; }

/* ── 목록 ─────────────────────────────────── */
#list-view { display: flex; flex-direction: column; gap: 12px; }
.tpl-card { background: #fff; border-radius: 12px; padding: 16px 20px; border: 1px solid #ECE6DA; display: flex; align-items: center; gap: 16px; animation: fadeIn 0.2s ease-out; }
.tpl-thumb { width: 56px; height: 74px; border-radius: 6px; overflow: hidden; background: #F0EBE1; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; }
.tpl-thumb img { width: 100%; height: 100%; object-fit: cover; }
.tpl-info { flex: 1; min-width: 0; }
.tpl-name { font-size: 14px; font-weight: 600; color: #1A1916; display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.badge { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 500; }
.badge-on  { background: #D1FAE5; color: #065F46; }
.badge-off { background: #F3F4F6; color: #6B7280; }
.tpl-names { font-size: 12px; color: #5C564D; }
.tpl-date  { font-size: 11px; color: #8A8378; margin-top: 2px; }
.tpl-actions { display: flex; gap: 6px; flex-shrink: 0; }
.empty-state { text-align: center; padding: 48px 20px; color: #8A8378; }
.empty-state p { font-size: 14px; }
.empty-state small { font-size: 12px; margin-top: 6px; display: block; }

/* ── 폼 ───────────────────────────────────── */
#form-view { display: flex; flex-direction: column; gap: 20px; animation: fadeIn 0.2s ease-out; }
.photo-preview { position: relative; display: inline-block; }
.photo-preview img { width: 120px; height: 160px; object-fit: cover; border-radius: 8px; display: block; }
.btn-remove-photo { position: absolute; top: 4px; right: 4px; width: 24px; height: 24px; border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff; border: none; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.btn-upload { width: 100%; justify-content: center; padding: 12px; border: 2px dashed #E0D9CE; border-radius: 8px; background: #FAFAF9; color: #5C564D; }
.transport-row { display: grid; grid-template-columns: 64px 1fr; gap: 8px; align-items: center; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; }
</style>
</head>
<body>

<!-- 로그인 -->
<div id="login-screen" class="hidden">
  <div class="card">
    <div class="login-heading">관리자 로그인</div>
    <div class="login-sub">청첩장 템플릿 관리</div>
    <form class="login-form" id="login-form">
      <div class="form-row">
        <label>이메일</label>
        <input type="email" id="login-email" placeholder="admin@example.com" required />
      </div>
      <div class="form-row">
        <label>비밀번호</label>
        <input type="password" id="login-pw" placeholder="••••••••" required />
      </div>
      <div class="error-box hidden" id="login-error"></div>
      <button type="submit" class="btn btn-primary" id="btn-login" style="justify-content:center;padding:11px">로그인</button>
    </form>
  </div>
</div>

<!-- 메인 -->
<div id="main-screen" class="hidden">
  <header>
    <div class="header-left">
      <button class="btn btn-ghost hidden" id="btn-back">← 목록</button>
      <span class="page-title" id="page-title">청첩장 템플릿 관리</span>
    </div>
    <div class="header-right">
      <button class="btn btn-primary hidden" id="btn-new">+ 새 템플릿</button>
      <button class="btn btn-ghost" id="btn-logout">로그아웃</button>
    </div>
  </header>

  <main>
    <!-- 로딩 -->
    <div id="list-loading" style="text-align:center;padding:48px"><div class="spinner" style="margin:0 auto"></div></div>

    <!-- 목록 -->
    <div id="list-view" class="hidden"></div>

    <!-- 폼 -->
    <form id="form-view" class="hidden">
      <!-- 기본 정보 -->
      <div class="card">
        <div class="section-title">기본 정보</div>
        <div style="display:flex;flex-direction:column;gap:14px">
          <div class="form-row">
            <label>템플릿 이름 (관리용)</label>
            <input type="text" name="label" placeholder="예: A안 (스탠다드)" required />
          </div>
          <div class="form-row">
            <label>결혼식 일시</label>
            <input type="datetime-local" name="date" required />
          </div>
          <div class="form-row">
            <label>공유 URL</label>
            <input type="text" name="shareUrl" placeholder="https://your-domain.web.app" />
          </div>
        </div>
      </div>

      <!-- 사진 -->
      <div class="card">
        <div class="section-title">커플 사진</div>
        <div id="photo-area"></div>
        <input type="file" id="photo-file" accept="image/*" style="display:none" />
      </div>

      <!-- 신랑 -->
      <div class="card" style="background:#FAFAF9">
        <div class="section-title">신랑</div>
        <div class="form-grid2">
          <div class="form-row"><label>이름</label><input type="text" name="groom.name" /></div>
          <div class="form-row"><label>항렬</label>
            <select name="groom.order">
              <option>장남</option><option>차남</option><option>삼남</option><option>막내아들</option>
              <option>장녀</option><option>차녀</option><option>삼녀</option><option>막내딸</option>
            </select>
          </div>
          <div class="form-row"><label>부 이름</label><input type="text" name="groom.father" /></div>
          <div class="form-row"><label>모 이름</label><input type="text" name="groom.mother" /></div>
        </div>
      </div>

      <!-- 신부 -->
      <div class="card" style="background:#FAFAF9">
        <div class="section-title">신부</div>
        <div class="form-grid2">
          <div class="form-row"><label>이름</label><input type="text" name="bride.name" /></div>
          <div class="form-row"><label>항렬</label>
            <select name="bride.order">
              <option>장남</option><option>차남</option><option>삼남</option><option>막내아들</option>
              <option>장녀</option><option>차녀</option><option>삼녀</option><option>막내딸</option>
            </select>
          </div>
          <div class="form-row"><label>부 이름</label><input type="text" name="bride.father" /></div>
          <div class="form-row"><label>모 이름</label><input type="text" name="bride.mother" /></div>
        </div>
      </div>

      <!-- 장소 -->
      <div class="card">
        <div class="section-title">예식 장소</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div class="form-grid2">
            <div class="form-row"><label>예식장 이름</label><input type="text" name="venue.name" /></div>
            <div class="form-row"><label>홀 이름</label><input type="text" name="venue.hall" /></div>
          </div>
          <div class="form-row"><label>주소</label><input type="text" name="venue.address" /></div>
          <div class="form-grid2">
            <div class="form-row"><label>위도 (lat)</label><input type="number" step="any" name="venue.lat" placeholder="37.5247" /></div>
            <div class="form-row"><label>경도 (lng)</label><input type="number" step="any" name="venue.lng" placeholder="127.0428" /></div>
          </div>
        </div>
      </div>

      <!-- 인사말 -->
      <div class="card">
        <div class="section-title">인사말</div>
        <div style="display:flex;flex-direction:column;gap:12px">
          <div class="form-row"><label>제목</label><input type="text" name="greeting.title" /></div>
          <div class="form-row"><label>본문</label><textarea name="greeting.body" rows="5"></textarea></div>
        </div>
      </div>

      <!-- 교통편 -->
      <div class="card">
        <div class="section-title">교통편 안내</div>
        <div id="transport-rows" style="display:flex;flex-direction:column;gap:10px"></div>
      </div>

      <!-- 푸터 -->
      <div class="card">
        <div class="section-title">하단 문구 (선택)</div>
        <textarea name="footer" rows="3" placeholder="비워두면 기본 문구 사용"></textarea>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="btn-cancel">취소</button>
        <button type="submit" class="btn btn-primary" id="btn-save">저장</button>
      </div>
    </form>
  </main>
</div>

<!-- Firebase compat SDK -->
<script src="/__/firebase/12.13.0/firebase-app-compat.js"></script>
<script src="/__/firebase/12.13.0/firebase-auth-compat.js"></script>
<script src="/__/firebase/12.13.0/firebase-firestore-compat.js"></script>
<script src="/__/firebase/12.13.0/firebase-storage-compat.js"></script>
<script src="/__/firebase/init.js"></script>
<script src="manager.js"></script>
</body>
</html>
